<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>
<button onclick="start()">Start Gyro2</button>

<script>
let client;
let sending = false;
let latestData = {x:0,y:0,z:0};

// HiveMQ WebSocket
const broker = "wss://broker.hivemq.com:8884/mqtt";
const topic  = "makoto/phone/gyro";
    
function connectMQTT() {
    client = mqtt.connect(broker);

    client.on("connect", function () {
        console.log("MQTT connected");
    });
    client.on("error", function (err) {
        console.log("MQTT error:", err);
    });    
}

function startGyro() {
    if (typeof DeviceMotionEvent.requestPermission === "function") {
        DeviceMotionEvent.requestPermission().then(response => {
            if (response === "granted") {
                beginSending();
            } else {
                alert("Permission denied");
            }
        });
    } else {
        beginSending();
    }
}

function beginSending() {
    if (sending) return;
    sending = true;

    // センサー値を常に更新
    window.addEventListener("devicemotion", function(event) {
        latestData.x = event.rotationRate?.alpha || 0;
        latestData.y = event.rotationRate?.beta || 0;
        latestData.z = event.rotationRate?.gamma || 0;
    });

    // 50msごとに送信（20Hz）
    setInterval(function(){
        if (sending && client.connected) {
            client.publish(topic, JSON.stringify(latestData));
        }
    }, 50);
}
    
connectMQTT();
    
</script>
</body>
</html>
