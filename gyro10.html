<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>  
<style>
body { font-family: sans-serif; text-align:center; }
button { font-size:18px; margin:8px; padding:8px; }
.box { border:1px solid #ccc; margin:10px; padding:10px; }
.dataRow { margin:4px; }
</style> 
</head>
<body>

<h2>📱 Gyro + MQTT Multi Monitor</h2>

<button onclick="startGyro()">Start Gyro</button>
<button onclick="stopGyro()">Stop Gyro</button>
<button onclick="ledOn()">LED ON</button>
<button onclick="ledOff()">LED OFF</button>  

<div class="box">
<h3>Gyro送信値</h3>
X: <span id="gx">0</span><br>
Y: <span id="gy">0</span><br>
Z: <span id="gz">0</span>
</div>

<div class="box">
<h3>Picoから受信（makoto/pico/#）</h3>
<div id="mqttMessages"></div>
</div>
  
<canvas id="tempChart"></canvas>
<canvas id="luxChart"></canvas>
  
<script>
let client;
let sending = false;
let latestData = {x:0,y:0,z:0};

// ===== 設定 =====
const broker = "wss://broker.hivemq.com:8884/mqtt";
const topicGyro2  = "makoto/phone/gyro";
const topicGyro = "makoto/pico/servo";
const topicSubscribe  = "makoto/pico/#";

window.addEventListener("devicemotion", function(event){

    if (!event.rotationRate) return;

    let beta = event.rotationRate.beta || 0;

    // -90〜90 → 0〜180 に変換
    let angle = Math.round(90 + beta);

    angle = Math.max(0, Math.min(180, angle));

    latestData = angle;
});

setInterval(function(){
    if (sending && client.connected) {
        client.publish(topicGyro, String(latestData));
    }
}, 100);
  
// 受信データ保持用
let topicData = {};

// ===== MQTT接続 =====
function connectMQTT() {
    client = mqtt.connect(broker, {
        clientId: "phone_" + Math.random().toString(16).substr(2,8),
        clean: true,
        reconnectPeriod: 1000
    });

    client.on("connect", function () {
        console.log("MQTT connected");
        client.subscribe(topicSubscribe);
    });

    client.on("message", function (topic, message) {
        topicData[topic] = message.toString();
        updateDisplay();
    });

    client.on("error", function (err) {
        console.log("MQTT error:", err);
    });
}

// ===== 受信表示更新 =====
function updateDisplay() {
    const container = document.getElementById("mqttMessages");
    container.innerHTML = "";

    for (let t in topicData) {
        const row = document.createElement("div");
        row.className = "dataRow";
        row.innerText = t + " : " + topicData[t];
        container.appendChild(row);
    }
}

// ===== Gyro開始 =====
function startGyro() {

    if (!client || !client.connected) {
        alert("MQTT not connected yet");
        return;
    }

    if (typeof DeviceMotionEvent.requestPermission === "function") {
        DeviceMotionEvent.requestPermission().then(response => {
            if (response === "granted") {
                beginSending();
            } else {
                alert("Permission denied");
            }
        });
    } else {
        beginSending();
    }
}

function stopGyro() {
    sending = false;
}

function ledOn(){
    client.publish("makoto/pico/control", "ON");
}

function ledOff(){
    client.publish("makoto/pico/control", "OFF");
}

  
function beginSending() {

    if (sending) return;
    sending = true;

    window.addEventListener("devicemotion", function(event) {

        if (!event.rotationRate) return;

        latestData.x = event.rotationRate.alpha || 0;
        latestData.y = event.rotationRate.beta  || 0;
        latestData.z = event.rotationRate.gamma || 0;

        document.getElementById("gx").innerText = latestData.x.toFixed(1);
        document.getElementById("gy").innerText = latestData.y.toFixed(1);
        document.getElementById("gz").innerText = latestData.z.toFixed(1);
    });

    setInterval(function(){
        if (sending && client.connected) {
            client.publish(topicGyro2, JSON.stringify(latestData));
        }
    }, 100);  // 100ms送信
}

// ===== 初期化 =====
connectMQTT();

let tempData = [];
let luxData = [];
let labels = [];

const tempChart = new Chart(document.getElementById("tempChart"), {
    type: "line",
    data: {
        labels: labels,
        datasets: [{
            label: "Temperature",
            data: tempData
        }]
    }
});

const luxChart = new Chart(document.getElementById("luxChart"), {
    type: "line",
    data: {
        labels: labels,
        datasets: [{
            label: "Lux",
            data: luxData
        }]
    }
});

client.on("message", function(topic, message){

    let value = message.toString();

    if(topic === "makoto/pico/temp"){
        tempData.push(parseFloat(value));
    }

    if(topic === "makoto/pico/lux"){
        luxData.push(parseFloat(value));
    }

    labels.push("");

    if(labels.length > 30){
        labels.shift();
        tempData.shift();
        luxData.shift();
    }

    tempChart.update();
    luxChart.update();
});
  
</script>
</body>
</html>
